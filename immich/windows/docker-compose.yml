#
# WARNING: To install Immich, follow our guide: https://docs.immich.app/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.

name: immich

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - ${EXTERNAL_LIB_LOCATION}:/photos:ro
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    logging: *default-logging

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    logging: *default-logging


  immich-folder-album-creator:
    container_name: immich_folder_album_creator
    image: salvoxia/immich-folder-album-creator:latest
    restart: unless-stopped
    depends_on:
      - immich-server
    environment:
      API_URL: ${IMMICH_API_URL_INTERNAL}
      API_KEY: ${IMMICH_FOLDER_ALBUM_CREATOR_API_KEY}
      ROOT_PATH: ${IMMICH_FOLDER_ALBUM_CREATOR_ROOT_PATH}
      ALBUM_LEVELS: ${IMMICH_FOLDER_ALBUM_CREATOR_ALBUM_LEVELS}
      UNATTENDED: "1"
      CRON_EXPRESSION: "${IMMICH_FOLDER_ALBUM_CREATOR_CRON}"
      RUN_IMMEDIATELY: "${IMMICH_FOLDER_ALBUM_CREATOR_RUN_IMMEDIATELY}"
    volumes:
      - ${EXTERNAL_LIB_LOCATION}:/photos:ro
      - ./src:/scripts:ro
    logging: *default-logging

  # One-off container for running management scripts
  # Usage: docker compose run --rm immich-scripts <command> [options]
  # Examples:
  #   docker compose run --rm immich-scripts help                 # Show all commands
  #   docker compose run --rm immich-scripts clean-albums         # Remove orphan albums
  #   docker compose run --rm immich-scripts find-duplicates      # Find duplicate photos
  #   docker compose run --rm immich-scripts clean-trash          # Manage trashed assets
  immich-scripts:
    container_name: immich_scripts
    image: python:3.11-slim
    profiles: ["scripts"]
    depends_on:
      - immich-server
    environment:
      IMMICH_API_URL_INTERNAL: ${IMMICH_API_URL_INTERNAL}
      IMMICH_FOLDER_ALBUM_CREATOR_API_KEY: ${IMMICH_FOLDER_ALBUM_CREATOR_API_KEY}
      IMMICH_FOLDER_ALBUM_CREATOR_ROOT_PATH: ${IMMICH_FOLDER_ALBUM_CREATOR_ROOT_PATH}
      IMMICH_FOLDER_ALBUM_CREATOR_ALBUM_LEVELS: ${IMMICH_FOLDER_ALBUM_CREATOR_ALBUM_LEVELS}
      EXTERNAL_LIB_LOCATION: /photos
    volumes:
      - ${EXTERNAL_LIB_LOCATION}:/photos:ro
      - ./src:/scripts:ro
      - ./.env:/app/.env:ro
    working_dir: /scripts
    entrypoint: ["/scripts/run.sh"]
    command: ["help"]

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    logging: *default-logging

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false
    logging: *default-logging

volumes:
  model-cache:
  pgdata:
